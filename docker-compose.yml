version: "3.8"

services:
  node-backend:
    build: ./backend
    ports:
      - "5000:5000"
    container_name: node-api

  dotnet-backend:
    build: ./VenueAPI
    ports:
      - "5195:5195"
    container_name: dotnet-api

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    container_name: react-app
    depends_on:
      - node-backend
      - dotnet-backend
